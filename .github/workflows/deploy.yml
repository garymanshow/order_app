# GitHub Actions workflow для автоматической сборки и деплоя Flutter PWA на GitHub Pages
# Срабатывает при создании тега формата v*.*.* (например, v1.0.0, v2.1.3)

name: Deploy Flutter PWA to GitHub Pages

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  flutter_version: '3.41.4'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📂 Setup Pages
        uses: actions/configure-pages@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.flutter_version }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze

      - name: 🧪 Run tests (optional)
        run: flutter test
        continue-on-error: true

      - name: 📝 Get repository name
        id: repo-name
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "name=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "Repository name: $REPO_NAME"

      - name: 🏗️ Build Flutter web
        run: |
          flutter build web \
            --release \
            --base-href "/${{ steps.repo-name.outputs.name }}/"

      - name: 📋 Create version info
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          BUILD_DIR="build/web"
          cat > $BUILD_DIR/version.json << EOF
          {
            "version": "$VERSION",
            "buildDate": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "commitSha": "${{ github.sha }}",
            "repository": "${{ github.repository }}"
          }
          EOF

      - name: 📄 Add .nojekyll
        run: touch build/web/.nojekyll

      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deployment info
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "📍 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "🏷️ Version: ${GITHUB_REF#refs/tags/}"