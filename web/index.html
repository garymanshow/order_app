<!DOCTYPE html>

  <!--
    ============================================================
    FLUTTER PWA ДЛЯ GITHUB PAGES - ПРИМЕР INDEX.HTML
    ============================================================
    
    ВАЖНЫЕ ЗАМЕЧАНИЯ:
    
    1. <base href="$FLUTTER_BASE_HREF"> - НЕ ИЗМЕНЯЙТЕ ЭТО ЗНАЧЕНИЕ!
       Flutter автоматически заменит $FLUTTER_BASE_HREF на правильный путь
       при сборке с флагом --base-href
    
    2. Используйте ОТНОСИТЕЛЬНЫЕ пути для всех ресурсов:
       ✅ href="manifest.json"
       ✅ href="icons/Icon-192.png"
       ❌ href="/manifest.json"
       ❌ href="/icons/Icon-192.png"
    
    3. Для локальной разработки используйте:
       flutter run -d chrome
       
       Для сборки на GitHub Pages:
       flutter build web --base-href "/repository-name/"
    ============================================================
  -->

  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #5D4037;
      /* Цвет фона из manifest */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    /* 🔥 SPLASH SCREEN: Центрированный логотип при загрузке */
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      width: 100vw;
      position: fixed;
      top: 0;
      left: 0;
      background-color: #5D4037;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .loading-container img {
      width: 120px;
      /* Размер логотипа при запуске */
      height: 120px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0.8;
      }
    }

    /* Скрытие splash screen после загрузки Flutter */
    .loading-container.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>

<body>
  <!-- 🔥 SPLASH SCREEN: Картинка, которую увидят первой -->
  <div class="loading-container" id="loading">
    <img src="icons/Icon-512.png" alt="Logo" />
  </div>

  <script src="scripts/push-client.js"></script>
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // 🔥 Регистрация Service Workers
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        // Основной SW (для офлайна)
        navigator.serviceWorker.register('sw.js')
          .then(function (reg) {
            console.log('✅ SW зарегистрирован');
          })
          .catch(function (err) {
            console.warn('⚠️ Ошибка SW:', err);
          });

        // Push SW (для уведомлений)
        navigator.serviceWorker.register('push-sw.js')
          .then(function (reg) {
            console.log('📬 Push SW зарегистрирован');
          })
          .catch(function (err) {
            console.warn('⚠️ Ошибка Push SW:', err);
          });
      });
    }

    // 🔥 Скрытие Splash Screen после загрузки Flutter
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading');
      if (loader) {
        loader.classList.add('hidden');
        // Удаляем из DOM через 0.3с (время анимации)
        setTimeout(function () {
          loader.remove();
        }, 300);
      }
    });
  </script>
</body>
